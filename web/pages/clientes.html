<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Clientes | ERP Elizeu</title>

    <link rel="stylesheet" href="../css/app.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="wrapper">

        <div id="sidebar"></div>

        <main class="main">

            <div id="topbar"></div>

            <section class="content">

                <div class="page-header">

                    <div>

                        <h1 class="page-title">

                            Clientes

                        </h1>

                        <p class="page-subtitle">

                            Cadastro e gerenciamento de clientes.

                        </p>

                    </div>

                    <div class="page-actions">

                        <button class="btn btn-primary" onclick="abrirModal()">

                            <i class="fas fa-plus"></i>

                            Novo Cliente

                        </button>

                    </div>

                </div>

                <div class="card">

                    <div class="card-body">

                        <div class="filters">

                            <div class="form-group">

                                <label>Pesquisar</label>

                                <input type="text" id="pesquisa" class="form-control" placeholder="Nome, CPF/CNPJ..."
                                    onkeyup="filtrarClientes()">

                            </div>

                        </div>

                        <div class="table-responsive">

                            <table class="table">

                                <thead>

                                    <tr>

                                        <th>Nome</th>

                                        <th>CPF/CNPJ</th>

                                        <th>Telefone</th>

                                        <th>E-mail</th>

                                        <th>Status</th>

                                        <th width="130">

                                            Ações

                                        </th>

                                    </tr>

                                </thead>

                                <tbody id="tabelaClientes">

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>
                <!-- Modal -->

                <div class="modal-overlay" id="modalCliente">

                    <div class="modal modal-lg">

                        <div class="modal-header">

                            <h2 class="modal-title">

                                Cadastro de Cliente

                            </h2>

                            <button type="button" class="modal-close" onclick="fecharModal()">

                                &times;

                            </button>

                        </div>

                        <div class="modal-body">

                            <form id="formCliente">

                                <div class="row">

                                    <div class="col-3">

                                        <div class="form-group">

                                            <label>Tipo Pessoa</label>

                                            <select id="tipoPessoa" class="form-control">

                                                <option value="FISICA">

                                                    Pessoa Física

                                                </option>

                                                <option value="JURIDICA">

                                                    Pessoa Jurídica

                                                </option>

                                            </select>

                                        </div>

                                    </div>

                                    <div class="col">

                                        <div class="form-group">

                                            <label>Nome</label>

                                            <input type="text" id="nome" class="form-control" required>

                                        </div>

                                    </div>

                                </div>

                                <div class="row">

                                    <div class="col">

                                        <div class="form-group">

                                            <label>Nome Fantasia</label>

                                            <input type="text" id="nomeFantasia" class="form-control">

                                        </div>

                                    </div>

                                    <div class="col-3">

                                        <div class="form-group">

                                            <label>CPF / CNPJ</label>

                                            <input type="text" id="cpfCnpj" class="form-control">

                                        </div>

                                    </div>

                                    <div class="col-3">

                                        <div class="form-group">

                                            <label>Inscrição Estadual</label>

                                            <input type="text" id="inscricaoEstadual" class="form-control">

                                        </div>

                                    </div>

                                </div>

                                <div class="row">

                                    <div class="col">

                                        <div class="form-group">

                                            <label>E-mail</label>

                                            <input type="email" id="email" class="form-control">

                                        </div>

                                    </div>

                                    <div class="col-3">

                                        <div class="form-group">

                                            <label>Telefone</label>

                                            <input type="text" id="telefone" class="form-control">

                                        </div>

                                    </div>

                                    <div class="col-3">

                                        <div class="form-group">

                                            <label>Celular</label>

                                            <input type="text" id="celular" class="form-control">

                                        </div>

                                    </div>

                                </div>

                                <div class="row">

                                    <div class="col-3">

                                        <div class="form-group">

                                            <label>CEP</label>

                                            <input type="text" id="cep" class="form-control">

                                        </div>

                                    </div>

                                    <div class="col">

                                        <div class="form-group">

                                            <label>Endereço</label>

                                            <input type="text" id="endereco" class="form-control">

                                        </div>

                                    </div>

                                    <div class="col-3">

                                        <div class="form-group">

                                            <label>Número</label>

                                            <input type="text" id="numero" class="form-control">

                                        </div>

                                    </div>

                                </div>

                                <div class="row">

                                    <div class="col">

                                        <div class="form-group">

                                            <label>Complemento</label>

                                            <input type="text" id="complemento" class="form-control">

                                        </div>

                                    </div>

                                    <div class="col">

                                        <div class="form-group">

                                            <label>Bairro</label>

                                            <input type="text" id="bairro" class="form-control">

                                        </div>

                                    </div>

                                </div>
                                <div class="row">

                                    <div class="col">

                                        <div class="form-group">

                                            <label>Cidade</label>

                                            <input type="text" id="cidade" class="form-control">

                                        </div>

                                    </div>

                                    <div class="col-3">

                                        <div class="form-group">

                                            <label>Estado</label>

                                            <input type="text" id="estado" maxlength="2" class="form-control">

                                        </div>

                                    </div>

                                </div>

                                <div class="row">

                                    <div class="col-3">

                                        <div class="form-group">

                                            <label>Limite de Crédito</label>

                                            <input type="number" step="0.01" id="limiteCredito" class="form-control">

                                        </div>

                                    </div>

                                    <div class="col-3">

                                        <div class="form-group">

                                            <label>Prazo Padrão (dias)</label>

                                            <input type="number" id="prazoPagamentoPadrao" class="form-control">

                                        </div>

                                    </div>

                                </div>

                                <div class="form-group">

                                    <label>Observações</label>

                                    <textarea id="observacoes" class="form-control"></textarea>

                                </div>

                            </form>

                        </div>

                        <div class="modal-footer">

                            <button class="btn btn-light" onclick="fecharModal()">

                                Cancelar

                            </button>

                            <button type="button" class="btn btn-primary" onclick="salvarCliente()">

                                <i class="fas fa-save"></i>

                                Salvar Cliente

                            </button>

                        </div>

                    </div>

                </div>

            </section>

        </main>

    </div>

    <script src="../js/layout.js"></script>

    <script src="../js/api.js"></script>

    <script src="../js/utils.js"></script>

    <script src="../js/app.js"></script>

    <script src="../js/menu.js"></script>

    <script src="../js/clientes.js"></script>

</body>

</html>
