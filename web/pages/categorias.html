<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Categorias | ERP Elizeu</title>

    <link rel="stylesheet" href="../css/app.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="wrapper">

        <div id="sidebar"></div>

        <main class="main">

            <div id="topbar"></div>

            <section class="content">

                <div class="page-header">

                    <div>

                        <h1 class="page-title">

                            Categorias

                        </h1>

                        <p class="page-subtitle">

                            Cadastro de categorias de produtos.

                        </p>

                    </div>

                    <div class="page-actions">

                        <button class="btn btn-primary" onclick="abrirModalCategoria()">

                            <i class="fas fa-plus"></i>

                            Nova Categoria

                        </button>

                    </div>

                </div>

                <div class="card">

                    <div class="card-body">

                        <div class="filters">

                            <div class="form-group">

                                <label>Pesquisar</label>

                                <input id="pesquisa" class="form-control" placeholder="Nome da categoria..."
                                    onkeyup="filtrarCategorias()">

                            </div>

                        </div>

                        <div class="table-responsive">

                            <table class="table">

                                <thead>

                                    <tr>

                                        <th>Nome</th>

                                        <th>Descrição</th>

                                        <th>Status</th>

                                        <th width="130">

                                            Ações

                                        </th>

                                    </tr>

                                </thead>

                                <tbody id="tabelaCategorias">

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

                <div class="modal-overlay" id="modalCategoria">

                    <div class="modal">

                        <div class="modal-header">

                            <h2 class="modal-title">

                                Cadastro de Categoria

                            </h2>

                            <button class="modal-close" onclick="fecharModalCategoria()">

                                &times;

                            </button>

                        </div>

                        <div class="modal-body">

                            <form id="formCategoria">

                                <div class="form-group">

                                    <label>

                                        Nome

                                    </label>

                                    <input id="nome" class="form-control">

                                </div>

                                <div class="form-group">

                                    <label>

                                        Descrição

                                    </label>

                                    <textarea id="descricao" class="form-control"></textarea>

                                </div>

                            </form>

                        </div>

                        <div class="modal-footer">

                            <button type="button" class="btn btn-light" onclick="fecharModalCategoria()">

                                Cancelar

                            </button>

                            <button type="button" class="btn btn-primary" onclick="salvarCategoria()">

                                <i class="fas fa-save"></i>

                                Salvar Categoria

                            </button>

                        </div>

                    </div>

                </div>

            </section>

        </main>

    </div>

    <script src="../js/layout.js"></script>

    <script src="../js/api.js"></script>

    <script src="../js/utils.js"></script>

    <script src="../js/app.js"></script>

    <script src="../js/menu.js"></script>

    <script src="../js/categorias.js"></script>

</body>

</html>
