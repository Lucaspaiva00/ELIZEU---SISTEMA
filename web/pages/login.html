<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | ERP Elizeu</title>

    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/login.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body class="login-body">

    <div class="login-container">

        <div class="login-card">

            <div class="login-header">

                <h1>ERP Elizeu</h1>

                <p>Faça login para continuar</p>

            </div>

            <form id="formLogin">

                <div class="form-group">

                    <label>E-mail</label>

                    <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail" required>

                </div>

                <div class="form-group">

                    <label>Senha</label>

                    <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" required>

                </div>

                <button type="submit" class="btn btn-primary btn-block">

                    <i class="fas fa-sign-in-alt"></i>

                    Entrar

                </button>

            </form>

            <div id="mensagem" class="mt-2 text-center text-danger">

            </div>

        </div>

    </div>

    <script src="../js/api.js"></script>
    <script src="../js/login.js"></script>

</body>

</html>
